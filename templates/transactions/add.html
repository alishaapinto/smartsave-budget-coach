{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
  <div class="col-12 col-md-6 col-lg-5">
    <div class="card bg-card p-4">
      <div class="card-body">
        <h4 class="fw-bold mb-3"><i class="bi bi-plus-circle text-primary me-2"></i>Add Transaction</h4>
        <p class="text-muted small mb-4">Record a new transaction. Base currency is stored in INR.</p>
        
        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          
          <div class="mb-3">
            <label class="form-label">Date</label>
            <input type="date" name="date" id="tx_date" class="form-control" required>
          </div>
          
          <div class="mb-3">
            <label class="form-label">Type</label>
            <select name="type" class="form-select">
              <option value="expense">Expense</option>
              <option value="income">Income</option>
            </select>
          </div>
          
          <div class="mb-3">
            <label class="form-label">Category</label>
            <select name="category" class="form-select">
              {% for c in categories %}
              <option value="{{ c }}">{{ c }}</option>
              {% endfor %}
            </select>
          </div>
          
          <div class="mb-3">
            <label class="form-label">Amount (INR)</label>
            <div class="input-group">
              <span class="input-group-text bg-dark border-secondary text-muted">₹</span>
              <input name="amount" type="number" step="0.01" class="form-control" placeholder="0.00" required>
            </div>
          </div>
          
          <div class="mb-3 form-check form-switch p-0 ps-5">
            <input type="checkbox" name="emergency" class="form-check-input" id="em">
            <label class="form-check-label text-warning fw-semibold" for="em">
              <i class="bi bi-exclamation-triangle"></i> Mark as Emergency Expense
            </label>
          </div>
          
          <div class="mb-4">
            <label class="form-label">Description</label>
            <input name="description" class="form-control" placeholder="Optional notes...">
          </div>
          
          <div class="d-flex justify-content-between align-items-center">
            <a href="/transactions" class="text-muted small" style="text-decoration:none;"><i class="bi bi-arrow-left me-1"></i>Cancel</a>
            <button class="btn btn-primary px-4"><i class="bi bi-check-lg me-1"></i>Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  // Set default date to today
  document.getElementById('tx_date').valueAsDate = new Date();
</script>
{% endblock %}
