{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
  <div class="col-12 col-md-6 col-lg-5">
    <div class="card bg-card p-4">
      <div class="card-body">
        <h4 class="fw-bold mb-3"><i class="bi bi-compass-fill text-primary me-2"></i>Create Savings Goal</h4>
        <p class="text-muted small mb-4">Set up a target amount and deadline to achieve a new savings goal.</p>
        
        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          
          <div class="mb-3">
            <label class="form-label">Goal Name</label>
            <input name="goal_name" class="form-control" placeholder="e.g. New Laptop, Emergency Fund" required>
          </div>
          
          <div class="mb-3">
            <label class="form-label">Target Amount (INR)</label>
            <div class="input-group">
              <span class="input-group-text bg-dark border-secondary text-muted">₹</span>
              <input name="target_amount" type="number" step="0.01" class="form-control" placeholder="0.00" required>
            </div>
          </div>
          
          <div class="mb-4">
            <label class="form-label">Deadline</label>
            <input type="date" name="deadline" class="form-control">
          </div>
          
          <div class="d-flex justify-content-between align-items-center">
            <a href="/goals" class="text-muted small" style="text-decoration:none;"><i class="bi bi-arrow-left me-1"></i>Cancel</a>
            <button class="btn btn-primary px-4"><i class="bi bi-check-lg me-1"></i>Create</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
