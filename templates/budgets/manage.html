{% extends 'base.html' %}
{% block content %}
<div class="row g-4">
  <div class="col-12 col-md-5">
    <div class="card bg-card p-4">
      <div class="card-body">
        <h4 class="fw-bold mb-3"><i class="bi bi-calendar-check-fill text-primary me-2"></i>Set Budget</h4>
        <p class="text-muted small mb-4">Set your monthly budget limit in INR.</p>
        
        <form method="post" action="/budgets/set">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          
          <div class="mb-3">
            <label class="form-label">Month</label>
            <input type="month" name="month" class="form-control" value="{{ month }}" required>
          </div>
          
          <div class="mb-4">
            <label class="form-label">Budget Amount (INR)</label>
            <div class="input-group">
              <span class="input-group-text bg-dark border-secondary text-muted">₹</span>
              <input name="amount" type="number" step="0.01" class="form-control" placeholder="0.00" required>
            </div>
          </div>
          
          <button class="btn btn-primary w-100"><i class="bi bi-save me-1"></i>Save Budget Limit</button>
        </form>
      </div>
    </div>
  </div>
  
  <div class="col-12 col-md-7">
    <div class="card bg-card p-4">
      <h5 class="fw-bold mb-3"><i class="bi bi-clock-history text-indigo-400 me-2"></i>Budget History</h5>
      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th>Month</th>
              <th>Budget Amount</th>
            </tr>
          </thead>
          <tbody>
            {% for b in budgets %}
            <tr>
              <td class="fw-semibold text-muted">{{ b.month }}</td>
              <td class="fw-bold text-indigo-300">{{ b.budget_amount|inr }}</td>
            </tr>
            {% else %}
            <tr>
              <td colspan="2" class="text-center py-4 text-muted">
                <i class="bi bi-slash-circle fs-3 d-block mb-2"></i>
                <span>No budgets set yet.</span>
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
{% endblock %}
