{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
  <div class="col-12 col-md-5">
    <div class="card bg-card p-4">
      <div class="card-body">
        <h3 class="fw-bold mb-3"><i class="bi bi-box-arrow-in-right text-primary me-2"></i>Login</h3>
        <p class="text-muted small mb-4">Access your SmartSave coach dashboard.</p>
        <form method="post">
          {{ form.hidden_tag() }}
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input name="email" class="form-control {% if form.email.errors %}is-invalid{% endif %}" type="email" value="{{ form.email.data or '' }}" placeholder="name@example.com" required>
            {% for error in form.email.errors %}
              <div class="invalid-feedback">{{ error }}</div>
            {% endfor %}
          </div>
          <div class="mb-4">
            <label class="form-label">Password</label>
            <input name="password" class="form-control {% if form.password.errors %}is-invalid{% endif %}" type="password" placeholder="••••••••" required>
            {% for error in form.password.errors %}
              <div class="invalid-feedback">{{ error }}</div>
            {% endfor %}
          </div>
          <div class="d-flex justify-content-between align-items-center">
            <a href="/auth/forgot" class="text-muted small" style="text-decoration:none;"><i class="bi bi-question-circle me-1"></i>Forgot password?</a>
            <button class="btn btn-primary px-4"><i class="bi bi-box-arrow-in-right me-1"></i>Login</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
