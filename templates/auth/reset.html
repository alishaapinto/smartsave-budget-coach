{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
  <div class="col-12 col-md-6">
    <div class="card bg-card p-4">
      <div class="card-body">
        <h3 class="fw-bold mb-3"><i class="bi bi-shield-lock-fill text-primary me-2"></i>Reset Password</h3>
        <p class="text-muted small mb-4">Please type a secure new password for your account.</p>
        <form method="post">
          {{ form.hidden_tag() }}
          <div class="mb-4">
            <label class="form-label">New Password</label>
            <input name="password" class="form-control {% if form.password.errors %}is-invalid{% endif %}" type="password" placeholder="Min. 6 characters" required>
            {% for error in form.password.errors %}
              <div class="invalid-feedback">{{ error }}</div>
            {% endfor %}
          </div>
          <div class="d-flex justify-content-between align-items-center">
            <a href="/auth/login" class="text-muted small" style="text-decoration:none;"><i class="bi bi-arrow-left me-1"></i>Back to login</a>
            <button class="btn btn-primary px-4">Reset Password</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
